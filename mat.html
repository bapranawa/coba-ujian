<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ujian Digital SDN Karangrejek I</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #fbbc04; --danger: #d93025; --bg: #f1f3f4; }
        
        /* Mengunci geser kanan-kiri pada level body */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
        }

        * { box-sizing: border-box; }

        .container { 
            width: 95%; 
            max-width: 950px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin: 15px auto; 
        }

        .header-info { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Layout Utama */
        .exam-layout { display: none; grid-template-columns: 1fr 280px; gap: 20px; align-items: start; }
        .question-area { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; min-height: 350px; width: 100%; }
        
        /* Navigasi Panel (Desktop) */
        .nav-panel { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; position: sticky; top: 75px; max-height: 80vh; overflow-y: auto; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .num-btn { padding: 10px 2px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; text-align: center; font-weight: bold; font-size: 14px; }
        .num-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .num-btn.filled { background: #e8f0fe; color: var(--primary); border-color: var(--primary); }
        .num-btn.doubt { background: var(--secondary) !important; color: white !important; }

        /* Tombol Navigasi Melayang */
        #toggleNavBtn { 
            display: none; 
            position: fixed; 
            top: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 8px 15px; 
            border-radius: 20px; 
            background: var(--primary); 
            color: white; 
            border: 2px solid white; 
            font-size: 12px; 
            font-weight: bold; 
            z-index: 2001; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Perbaikan Tabel Agar Bisa Digeser Tanpa Merusak Layout */
        .table-container { 
            width: 100%; 
            overflow-x: auto; 
            margin: 15px 0; 
            border: 1px solid #eee;
            border-radius: 8px;
            -webkit-overflow-scrolling: touch; 
        }
        .soal-tabel { width: 100%; border-collapse: collapse; min-width: 400px; }
        .soal-tabel th, .soal-tabel td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        .soal-tabel td:first-child { text-align: left; width: 40%; background: #fafafa; }
        .cell-opt { cursor: pointer; font-weight: bold; background: #fff; }
        .cell-opt.selected { background: var(--primary) !important; color: white; }

        .q-img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }

        /* Opsi Jawaban */
        .option { display: flex; align-items: center; border: 2px solid #eee; margin-bottom: 10px; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; }
        .option.selected { border-color: var(--primary); background: #e8f0fe; }
        .opt-box, .opt-circle { width: 18px; height: 18px; border: 2px solid var(--primary); margin-right: 12px; flex-shrink: 0; }
        .opt-circle { border-radius: 50%; }
        .selected .opt-box { background: var(--primary); color: white; text-align: center; line-height: 15px; font-size: 12px; }
        .selected .opt-box:after { content: '✔'; }
        .selected .opt-circle { background: var(--primary); box-shadow: inset 0 0 0 3px white; }

        /* Buttons */
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-yellow { background: var(--secondary); }
        .btn-red { background: var(--danger); width: 100%; margin-top: 15px; }

        /* Responsif HP */
        @media screen and (max-width: 768px) {
            .container { 
                width: 100%; 
                margin: 0; 
                border-radius: 0; 
                box-shadow: none; 
                padding: 15px;
            }
            .exam-layout { grid-template-columns: 1fr; }
            .nav-panel { 
                position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; 
                z-index: 2005; background: white; border-radius: 0; padding: 60px 15px; 
                transition: 0.3s; box-shadow: -5px 0 10px rgba(0,0,0,0.1);
            }
            .nav-panel.open { right: 0; }
            .num-grid { grid-template-columns: repeat(4, 1fr); }
            input, select, .btn { font-size: 16px !important; } /* Cegah Zoom di iOS */
            
            /* Tambahan padding atas agar soal tidak tertutup tombol melayang */
            .exam-active-padding { padding-top: 55px !important; }
        }
    </style>
</head>
<body>

<button id="toggleNavBtn" onclick="toggleSidebar()">☰ Daftar Nomor Soal</button>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Info</h3>
        <p id="modalMsg"></p>
        <div id="modalFooter" style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button class="btn btn-blue" onclick="closeModal()">Oke</button>
        </div>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="login-sec">
        <div class="header-info"><h2>UJIAN DIGITAL</h2><h3>SDN KARANGREJEK I</h3></div>
        <label>Pilih Sekolah:</label>
        <select id="stuSekolah">
            <option>SDN KARANGREJEK I</option>
            <option>SD LAIN</option>
        </select>
        <label>Nama Lengkap:</label><input type="text" id="stuName" placeholder="Nama siswa...">
        <label>Nomor Absen:</label><input type="number" id="stuNo" placeholder="Nomor absen...">
        <label>Mata Pelajaran:</label>
        <select id="stuMapel">
            <option>BAHASA INDONESIA</option>
            <option>IPAS</option>
            <option>MATEMATIKA</option>
        </select>
        <button class="btn btn-blue" style="width:100%" onclick="mulai()">MULAI UJIAN</button>
    </div>

    <div id="exam-sec" class="exam-layout">
        <div class="question-area">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="q-num" style="color:var(--primary); font-weight:bold;">Soal No. 1</span>
                <span id="timer" style="color:var(--danger); font-weight:bold;">75:00</span>
            </div>
            <div id="q-text" style="font-size:17px; margin-bottom:15px;"></div>
            <div id="opt-area"></div>
            <div style="display:flex; justify-content:space-between; margin-top:20px; gap:8px;">
                <button class="btn btn-blue" onclick="nav(-1)" style="flex:1">Kembali</button>
                <button class="btn btn-yellow" onclick="toggleDoubt()" style="flex:1">Ragu</button>
                <button class="btn btn-blue" onclick="nav(1)" style="flex:1">Lanjut</button>
            </div>
        </div>
        
        <div class="nav-panel" id="sidebar">
            <h4 style="margin-top:0">Navigasi Nomor</h4>
            <div id="num-grid" class="num-grid"></div>
            <button class="btn btn-red" onclick="cekSebelumSelesai()">SELESAI & KIRIM</button>
            <button class="btn btn-reset" style="background:#eee;color:red;width:100%;margin-top:10px;font-size:10px;" onclick="resetSemuaDraf()">HAPUS DRAF</button>
        </div>
    </div>

    <div id="result-sec" style="display:none; text-align:center">
        <h2>HASIL UJIAN</h2>
        <h1 id="skor-akhir" style="font-size:60px; color:var(--primary);">0</h1>
        <div id="info-pribadi" style="padding:15px; background:#f9f9f9; border-radius:8px; margin-bottom:15px;"></div>
        <div id="stat-kirim" style="padding:10px; font-weight:bold;">Mengirim...</div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz9yHPeqABxKZIint0hzAPfe-ugZDenqrQRRVGrbTR-sVS_ye81CKttryFUDyuQHVIz/exec'; 

    const databaseSoal = `
Berdasarkan teks, tentukan sesuai atau tidak sesuai untuk pernyataan berikut! [TABEL]
Kandang ayam bersih dan berventilasi baik | Sesuai * | Tidak Sesuai
Ayam diberi makan pada malam hari | Sesuai | Tidak Sesuai *
Telur dikumpulkan setiap pagi dan sore | Sesuai * | Tidak Sesuai

Manakah fenomena yang sesuai dengan teks tanah longsor? [MCMA]
Pohon membantu tanah tetap kuat *
Penebangan pohon memperbesar risiko longsor *
Tanah gundul akan mudah bergerak *
Tanah longsor terjadi karena tanah terlalu kering

Pilih salah satu [IMG: https://awsimages.detik.net.id/community/media/visual/2023/05/15/ilustrasi-tata-surya.jpeg?w=1200]
Besar sudut BDC adalah 35° *
Besar sudut BCD adalah 65° 
Besar sudut ABD sama dengan sudut BDA
Semua besar susut salah
    `;

    let quizData = [], answers = [], doubtStatus = [], current = 0, timer, totalSec = 75 * 60;

    // Parsing sederhana
    databaseSoal.trim().split(/\n\s*\n/).forEach(block => {
        let lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        let q = lines[0], opts = [], keys = [];
        for(let i=1; i<lines.length; i++) {
            if(q.includes("[TABEL]")) {
                let parts = lines[i].split("|").map(p => p.trim());
                let subQ = parts[0], subOpts = parts.slice(1).map(o => o.replace('*','').trim());
                let subKey = parts.slice(1).find(o => o.includes('*')).replace('*','').trim();
                opts.push({subQ, subOpts}); keys.push(subKey);
            } else {
                let txt = lines[i].replace('*','').trim();
                if(lines[i].includes('*')) keys.push(txt);
                opts.push(txt);
            }
        }
        quizData.push({q, opts, keys});
    });

    function toggleSidebar() {
        const side = document.getElementById('sidebar');
        side.classList.toggle('open');
        document.getElementById('toggleNavBtn').innerHTML = side.classList.contains('open') ? "✕ Tutup" : "☰ Daftar Nomor Soal";
    }

    function showModal(title, msg, onOk = null, showCancel = false) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        const footer = document.getElementById('modalFooter');
        footer.innerHTML = "";
        if(showCancel) {
            let b = document.createElement("button"); b.className="btn"; b.style.background="#ccc"; b.innerText="Batal"; b.onclick=closeModal; footer.appendChild(b);
        }
        let o = document.createElement("button"); o.className="btn btn-blue"; o.innerText="Oke"; o.onclick=()=>{closeModal(); if(onOk) onOk();}; footer.appendChild(o);
        document.getElementById('customModal').style.display='flex';
    }

    function closeModal() { document.getElementById('customModal').style.display='none'; }

    function mulai() {
        if(!document.getElementById('stuName').value || !document.getElementById('stuNo').value) return showModal("Peringatan", "Isi Nama dan Absen!");
        
        localStorage.setItem('sch', document.getElementById('stuSekolah').value);
        localStorage.setItem('nam', document.getElementById('stuName').value);
        localStorage.setItem('abs', document.getElementById('stuNo').value);
        localStorage.setItem('map', document.getElementById('stuMapel').value);
        
        answers = JSON.parse(localStorage.getItem('ans')) || new Array(quizData.length).fill(null);
        doubtStatus = JSON.parse(localStorage.getItem('dbt')) || new Array(quizData.length).fill(false);
        
        document.getElementById('login-sec').style.display='none';
        document.getElementById('exam-sec').style.display='grid';
        
        if(window.innerWidth <= 768) {
            document.getElementById('toggleNavBtn').style.display='block';
            document.getElementById('mainContainer').classList.add('exam-active-padding');
        }
        
        tampil();
        timer = setInterval(() => {
            totalSec--;
            let m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(totalSec<=0) selesai();
        }, 1000);
    }

    function tampil() {
        let d = quizData[current], isMCMA = d.q.includes("[MCMA]"), isTABEL = d.q.includes("[TABEL]");
        document.getElementById('q-num').innerText = "Soal No. " + (current + 1);
        document.getElementById('q-text').innerHTML = d.q.replace("[TABEL]","").replace("[MCMA]","").replace(/\[IMG:\s*(.*?)\]/g, '<img src="$1" class="q-img">');
        
        let h = "";
        if(isTABEL) {
            h += `<div class="table-container"><table class="soal-tabel"><tr><th>Pernyataan</th><th>${d.opts[0].subOpts[0]}</th><th>${d.opts[0].subOpts[1]}</th></tr>`;
            d.opts.forEach((o, r) => {
                h += `<tr><td>${o.subQ}</td>`;
                o.subOpts.forEach(opt => {
                    let s = (Array.isArray(answers[current]) && answers[current][r] === opt);
                    h += `<td class="cell-opt ${s?'selected':''}" onclick="pilihTabel(${r},'${opt}')">${opt}</td>`;
                });
                h += `</tr>`;
            });
            h += `</table></div>`;
        } else {
            d.opts.forEach(o => {
                let s = isMCMA ? (Array.isArray(answers[current]) && answers[current].includes(o)) : (answers[current] === o);
                h += `<div class="option ${s?'selected':''}" onclick="pilih('${o}',${isMCMA})"><div class="${isMCMA?'opt-box':'opt-circle'}"></div><span>${o}</span></div>`;
            });
        }
        document.getElementById('opt-area').innerHTML = h;
        renderNav();
        window.scrollTo(0,0);
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    }

    function pilih(v, m) {
        if(m) {
            if(!Array.isArray(answers[current])) answers[current] = [];
            let i = answers[current].indexOf(v);
            if(i>-1) answers[current].splice(i,1); else answers[current].push(v);
            if(answers[current].length===0) answers[current]=null;
        } else answers[current] = v;
        localStorage.setItem('ans', JSON.stringify(answers));
        tampil();
    }

    function pilihTabel(r, v) {
        if(!Array.isArray(answers[current])) answers[current] = new Array(quizData[current].opts.length).fill(null);
        answers[current][r] = v;
        localStorage.setItem('ans', JSON.stringify(answers));
        tampil();
    }

    function toggleDoubt() { doubtStatus[current]=!doubtStatus[current]; localStorage.setItem('dbt',JSON.stringify(doubtStatus)); renderNav(); }

    function renderNav() {
        let h = "";
        quizData.forEach((q, i) => {
            let a = answers[i], l = q.q.includes("[MCMA]") ? (Array.isArray(a)&&a.length>0) : (q.q.includes("[TABEL]") ? (Array.isArray(a)&&a.length===q.opts.length&&a.every(x=>x!==null)) : !!a);
            h += `<div class="num-btn ${i===current?'active':''} ${doubtStatus[i]?'doubt':(l?'filled':'')}" onclick="current=${i};tampil()">${i+1}</div>`;
        });
        document.getElementById('num-grid').innerHTML = h;
    }

    function nav(v) { let t=current+v; if(t>=0 && t<quizData.length){current=t; tampil();} }

    function cekSebelumSelesai() {
        showModal("Konfirmasi", "Kirim jawaban sekarang?", () => selesai(), true);
    }

    function selesai() {
        clearInterval(timer);
        document.getElementById('toggleNavBtn').style.display='none';
        document.getElementById('exam-sec').style.display='none';
        document.getElementById('result-sec').style.display='block';
        
        let b = 0, rin = [];
        quizData.forEach((q, i) => {
            let c = false;
            if(q.q.includes("[TABEL]")) c = JSON.stringify(answers[i])===JSON.stringify(q.keys);
            else if(q.q.includes("[MCMA]")) c = (answers[i]||[]).sort().join("|")===q.keys.sort().join("|");
            else c = answers[i]===q.keys[0];
            if(c) b++;
            rin.push(`No${i+1}:${Array.isArray(answers[i])?answers[i].join("/"):answers[i]||'-'}`);
        });
        
        let s = Math.round((b/quizData.length)*100);
        document.getElementById('skor-akhir').innerText = s;
        document.getElementById('info-pribadi').innerText = `${localStorage.getItem('nam')} | Absen: ${localStorage.getItem('abs')}\n${localStorage.getItem('map')}`;
        
        const f = new URLSearchParams();
        f.append('sekolah', localStorage.getItem('sch')); f.append('nama', localStorage.getItem('nam'));
        f.append('absen', localStorage.getItem('abs')); f.append('mapel', localStorage.getItem('map'));
        f.append('nilai', s); f.append('analisis', rin.join(" | "));

        fetch(scriptURL, { method: 'POST', body: f, mode: 'no-cors' })
        .then(() => { document.getElementById('stat-kirim').innerHTML="✅ TERKIRIM"; localStorage.clear(); })
        .catch(() => { document.getElementById('stat-kirim').innerHTML="❌ GAGAL KIRIM"; });
    }

    function resetSemuaDraf() { if(confirm("Hapus draf?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
